name: Publish Runner Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ke7/helix-evo-runner

jobs:
  publish-base:
    name: Build and publish base runner image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-base
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and publish base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-backends:
    name: Build and publish backend runner images
    runs-on: ubuntu-latest
    needs: publish-base
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: claude
            dockerfile: docker/claude.Dockerfile
          - name: codex
            dockerfile: docker/codex.Dockerfile
          - name: cursor
            dockerfile: docker/cursor.Dockerfile
          - name: gemini
            dockerfile: docker/gemini.Dockerfile
          - name: opencode
            dockerfile: docker/opencode.Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Choose base tag
        id: base-tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}-base:${{ steps.base-tag.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  verify:
    name: Verify published runner images
    runs-on: ubuntu-latest
    needs: publish-backends
    permissions:
      packages: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: base
            command: "python --version && uv --version && git --version"
          - name: claude
            command: "claude --version"
          - name: codex
            command: "codex --version"
          - name: cursor
            command: "cursor agent --version"
          - name: gemini
            command: "gemini --version"
          - name: opencode
            command: "opencode --version"

    steps:
      - name: Choose tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and verify
        shell: bash
        run: |
          image="${IMAGE_PREFIX}-${{ matrix.image.name }}:${{ steps.tag.outputs.value }}"
          docker pull "$image"
          docker run --rm "$image" sh -lc '${{ matrix.image.command }}'
