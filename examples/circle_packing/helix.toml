[project]
objective = "Maximize the sum of radii of 26 non-overlapping circles packed in a unit square. Higher total radius sum = better packing."

# Uncomment to pass specific env vars through the scrub into evaluator
# and Claude Code subprocesses (e.g. GPU selection, cache dirs):
# passthrough_env = ["CUDA_VISIBLE_DEVICES", "MUJOCO_GL", "HF_HOME"]

[evaluator]
command = "python3 evaluate.py"
score_parser = "json_score"

[evolution]
max_generations = 30
merge_enabled = false
perfect_score_threshold = 100.0
max_evaluations = 500
max_claude_calls = 80

[claude]
model = "haiku"
effort = "low"
max_turns = 20
background = """
Circle packing benchmark: pack 26 non-overlapping circles in a unit square [0,1]x[0,1].
Each circle is (x, y, r) with r <= x, r <= y, r <= 1-x, r <= 1-y (inside bounds).
No two circles overlap: dist(c_i, c_j) >= r_i + r_j.
Score = sum of all radii. Current GEPA benchmark: 2.635. AlphaEvolve: ~2.635.

PROVEN WINNING STRATEGIES:
1. Use scipy.optimize (minimize with SLSQP or L-BFGS-B) for gradient-based optimization
2. Multiple random restarts to escape local minima (use 5-10 restarts — evaluation timeout is 300s)
3. Hexagonal/triangular packing as initial layout (better than grid)
4. Iterative coordinate descent: fix positions, maximize each radius independently
5. Force-directed relaxation: push overlapping circles apart
6. The pack_circles function must be deterministic or nearly so for reproducibility

KNOWN GOOD APPROACH (scipy):
- Variables: [x0, y0, r0, x1, y1, r1, ...] flattened
- Minimize: -sum(r_i)
- Constraints: r_i > 0, x_i - r_i >= 0, x_i + r_i <= 1, same for y
  dist(i,j) >= r_i + r_j for all pairs
- Use scipy.optimize.minimize with method='SLSQP' or 'trust-constr'
- Multiple random starts, keep best valid solution

Target score > 2.635 to beat GEPA benchmark.
"""
